<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes with Local Storage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Note Web Application</h1>
        <div class="input-container">
            <input type="text" id="notes" placeholder="Enter Your Notes Here">
            <button type="button" id="addBtn">Add Note</button>
        </div>
        <p class="error"></p>
        <ul class="notesList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
