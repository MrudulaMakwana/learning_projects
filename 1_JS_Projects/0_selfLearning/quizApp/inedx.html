<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="optionviewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div id="box">
        <h1>1) this is the dummmy question</h1>
        <div class="row">
            <input class="option" type="radio" name="option" id="option1" value="a">
            <label for="option1">Option 1</label>
        </div>
        <div class="row">
            <input class="option" type="radio" name="option" id="option2" value="b">
            <label for="option2">Option 2</label>
        </div>
        <div class="row">
            <input class="option" type="radio" name="option" id="option3" value="3">
            <label for="option3">Option 3</label>
        </div>
        <div class="row">
            <input class="option" type="radio" name="option" id="option4" value="4">
            <label for="option4">Option 4</label>
        </div>
        <button class="btn" onclick="submitQuiz()">Submit</button>
      </div>
        
      <p id="answer"></p>
     
    </div>

    <script src="script.js"></script>
  </body>
</html>
