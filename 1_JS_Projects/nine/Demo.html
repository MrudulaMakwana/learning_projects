<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
        .content{
            display: none;
        }
        .content.active{
            display: block;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Custom Tabs</h1>
      <div class="buttonContainer">
        <button data-id="home" class="tab-button active">Home</button>
        <button data-id="about" class="tab-button">About</button>
        <button data-id="contact" class="tab-button">contact</button>
        <button data-id="feedback" class="tab-button">Feedback</button>
      </div>
      <div class="contectConatiner">
        <p id="home" class="content active">
          home Lorem ipsum dolor sit amet consectetur.
        </p>
        <p id="about" class="content">
          about Lorem ipsum dolor sit amet consectetur.
        </p>
        <p id="contact" class="content">
          Conatct Lorem ipsum dolor sit amet consectetur.
        </p>
        <p id="feedback" class="content">
          feedback Lorem ipsum dolor sit amet consectetur.
        </p>
      </div>
    </div>

    <script>
       let tabButtons=document.querySelectorAll('.tab-button') 

       let contents=document.querySelectorAll('.content')

       let tabContainer=document.querySelector('.container')
       tabContainer.addEventListener('click',(e)=>{
        const currentId=e.target.dataset.id;
        if(currentId)
       {
        tabButtons.forEach(btn=>{
            btn.classList.remove('active')

        })
       
       }
       e.target.classList.add('active')
        contents.forEach(content=>{
            content.classList.remove('active')
        })
        const currentContentElement=document.getElementById(currentId)
        console.log('aa',currentContentElement);
        
        currentContentElement.classList.add('active')
       })

    </script>
  </body>
</html>
