<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagination Using Javascript</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Pagination Using Javascript</h1>
    <ul class="pagination-list" data-current-page="1">  
    </ul>
    <div class="paginationContainer">
      <button class="paginationBtn prevBtn">Previous</button>
      <div class="paginationNumbers"></div>
      <button class="paginationBtn nextBtn">Next</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
