<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Step Progress Bar</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 100vh;
        font-size: 20px;
        background-color: #361515;
      }

      .container {
        text-align: center;
        margin-top: 20px;
      }

      .progress-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 400px;
        position: relative;
        margin: 30px 0;
      }

      .progress-bar {
        background-color: #16692e;
        position: absolute;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
        height: 10px;
        width: 0%;
        transition: width 0.4s ease-in-out;
        border-radius: 5px;
      }

      .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        width: 100%;
        height: 10px;
        background-color: #ddd;
        transition: background 0.3s ease-in-out;
      }

      .step.active {
        background-color: #007bff;
      }

      .iconWrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: absolute;
        top: -20px;
        transform: translateX(-50%);
      }

      .iconWrapper i {
        font-size: 24px;
        color: #762b2b;
      }

      .iconWrapper p {
        font-size: 14px;
        margin-top: 5px;
        color: #7d2525;
      }

      .active i {
        color: #007bff;
      }

      .active p {
        color: #007bff;
      }

      button {
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        margin: 10px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Multi-Step Progress Bar</h1>
    <div class="container">
      <div class="progress-container">
        <div class="progress-bar"></div>

        <div class="iconWrapper active" style="left: 0%">
          <i class="fas fa-user"></i>
          <p class="label">Profile</p>
        </div>
        <div class="iconWrapper" style="left: 33%">
          <i class="fas fa-envelope"></i>
          <p class="label">Email</p>
        </div>
        <div class="iconWrapper" style="left: 66%">
          <i class="fas fa-lock"></i>
          <p class="label">Security</p>
        </div>
        <div class="iconWrapper" style="left: 100%">
          <i class="fas fa-check"></i>
          <p class="label">Complete</p>
        </div>
      </div>

      <button class="prevBtn" disabled>Previous</button>
      <button class="nextBtn">Next</button>
    </div>

    <script>
      let progress = document.querySelector('.progress-bar');
      const prevBtn = document.querySelector('.prevBtn');
      const nextBtn = document.querySelector('.nextBtn');
      let steps = document.querySelectorAll('.iconWrapper');

      let currentStep = 1;

      nextBtn.addEventListener('click', () => {
        if (currentStep < steps.length) {
          currentStep++;
        }
        updateStep();
      });

      prevBtn.addEventListener('click', () => {
        if (currentStep > 1) {
          currentStep--;
        }
        updateStep();
      });

      function updateStep() {
        steps.forEach((step, index) => {
          if (index < currentStep) {
            step.classList.add('active');
          } else {
            step.classList.remove('active');
          }
        });

        progress.style.width = ((currentStep - 1) / (steps.length - 1)) * 100 + "%";

        prevBtn.disabled = currentStep === 1;
        nextBtn.disabled = currentStep === steps.length;
      }
    </script>
  </body>
</html>
